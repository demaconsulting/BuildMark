---
# Software Unit Requirements for the Validation Class
#
# The Validation class executes the BuildMark self-validation test suite and
# writes results to standard test result files (TRX or JUnit XML format).

sections:
  - title: Validation Unit Requirements
    requirements:
      - id: BuildMark-Validation-Run
        title: The Validation class shall execute self-validation tests and produce a summary report.
        justification: |
          Regulated environments require tool qualification evidence that the tool functions
          correctly in the specific deployment environment. The Validation class exercises
          core BuildMark behaviors and produces a pass/fail summary to support tool
          qualification activities.
        tests:
          - Validation_Run_WithTrxResultsFile_WritesTrxFile
          - Validation_Run_WithXmlResultsFile_WritesJUnitFile

      - id: BuildMark-Validation-TrxOutput
        title: The Validation class shall write TRX format test results when a .trx results file is specified.
        justification: |
          TRX format support enables integration with Microsoft test tooling, Visual
          Studio Test Explorer, and Azure DevOps pipelines, providing native support
          for .NET development environments.
        tests:
          - Validation_Run_WithTrxResultsFile_WritesTrxFile
          - Validation_Run_WithUnsupportedResultsFileExtension_ShowsError

      - id: BuildMark-Validation-JUnitOutput
        title: The Validation class shall write JUnit XML format test results when an .xml results file is specified.
        justification: |
          JUnit format is a widely-supported standard across many CI/CD platforms and
          testing tools. Supporting this format ensures BuildMark can integrate with
          diverse toolchains beyond the Microsoft ecosystem.
        tests:
          - Validation_Run_WithXmlResultsFile_WritesJUnitFile
          - Validation_Run_WithUnsupportedResultsFileExtension_ShowsError
          - Validation_Run_WithInvalidResultsFilePath_ShowsError
