---
# Software Unit Requirements for the VersionInterval and VersionIntervalSet Classes
#
# VersionInterval represents a single mathematical version interval with inclusive
# or exclusive bounds (either of which may be null for an unbounded range).
# VersionIntervalSet is an ordered collection of VersionInterval instances parsed
# from the comma-separated affected-versions field.

sections:
  - title: VersionInterval Unit Requirements
    requirements:
      - id: BuildMark-VersionInterval-Parse
        title: >-
          The VersionInterval class shall parse a single interval token using standard
          mathematical interval notation, returning null for unrecognized input.
        justification: |
          Returning null for invalid tokens allows VersionIntervalSet to silently discard
          malformed ranges rather than failing the entire parse, making the feature
          tolerant of minor user errors in the buildmark block.
        tests:
          - VersionInterval_Parse_InclusiveLower_IsInclusive
          - VersionInterval_Parse_ExclusiveLower_IsExclusive
          - VersionInterval_Parse_InclusiveUpper_IsInclusive
          - VersionInterval_Parse_ExclusiveUpper_IsExclusive
          - VersionInterval_Parse_UnboundedLower_HasNullLowerBound
          - VersionInterval_Parse_UnboundedUpper_HasNullUpperBound
          - VersionInterval_Parse_BothBoundsPresent_ReturnsInterval
          - VersionInterval_Parse_InvalidFormat_ReturnsNull

      - id: BuildMark-VersionIntervalSet-Parse
        title: >-
          The VersionIntervalSet class shall parse a comma-separated string of interval
          tokens into an ordered collection of VersionInterval instances.
        justification: |
          The comma that separates multiple intervals also appears inside individual
          intervals (between lower and upper bounds). The parser must distinguish
          between the two by tracking bracket depth, ensuring disjoint version ranges
          can be expressed correctly in a single affected-versions field.
        tests:
          - VersionIntervalSet_Parse_SingleInterval_ReturnsOneInterval
          - VersionIntervalSet_Parse_TwoIntervals_ReturnsTwoIntervals
          - VersionIntervalSet_Parse_IntervalsWithInternalComma_ParsedCorrectly
          - VersionIntervalSet_Parse_EmptyString_ReturnsEmptySet
          - VersionIntervalSet_Parse_InvalidToken_DiscardedSilently
