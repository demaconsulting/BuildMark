---
# Software Unit Requirements for the AzureDevOpsRestClient Class
#
# AzureDevOpsRestClient handles paginated HTTPS communication with the Azure
# DevOps REST API endpoint. It supports both cloud (dev.azure.com) and
# on-premises Azure DevOps Server instances.

sections:
  - title: AzureDevOpsRestClient Unit Requirements
    requirements:
      - id: BuildMark-AzureDevOps-RestClient
        title: >-
          The AzureDevOpsRestClient shall retrieve repository details, commits, tags,
          pull requests, and work items from the Azure DevOps API, including support
          for paginated responses.
        justification: |
          The Azure DevOps REST API returns large result sets in pages. The client must
          transparently follow pagination to retrieve complete repository data so that
          build information reflects the full history. Authentication and response
          parsing must be handled reliably to support consistent data retrieval.
        tests:
          - AzureDevOpsRestClient_GetRepositoryAsync_ValidResponse_ReturnsRepository
          - AzureDevOpsRestClient_GetCommitsAsync_ValidResponse_ReturnsCommits
          - AzureDevOpsRestClient_GetPullRequestsAsync_ValidResponse_ReturnsPullRequests
          - AzureDevOpsRestClient_GetPullRequestWorkItemsAsync_ValidResponse_ReturnsWorkItemRefs
          - AzureDevOpsRestClient_GetWorkItemsAsync_ValidResponse_ReturnsWorkItems
          - AzureDevOpsRestClient_QueryWorkItemsAsync_ValidWiql_ReturnsWorkItemIds
          - AzureDevOpsRestClient_GetPullRequestWorkItemsAsync_StringValuedIds_DeserializesCorrectly
          - AzureDevOpsRestClient_QueryWorkItemsAsync_StringValuedIds_DeserializesCorrectly
        children:
          - BuildMark-AzureDevOps-GetRepository
          - BuildMark-AzureDevOps-GetCommits
          - BuildMark-AzureDevOps-GetTags
          - BuildMark-AzureDevOps-GetPullRequests
          - BuildMark-AzureDevOps-GetWorkItems

      - id: BuildMark-AzureDevOps-GetRepository
        title: The AzureDevOpsRestClient shall retrieve repository details from the Azure DevOps API.
        justification: |
          Repository detail retrieval provides the repository identity needed for subsequent
          API calls and for generating accurate hyperlinks in build notes.
        tests:
          - AzureDevOpsRestClient_GetRepositoryAsync_ValidResponse_ReturnsRepository

      - id: BuildMark-AzureDevOps-GetCommits
        title: The AzureDevOpsRestClient shall retrieve commits from the Azure DevOps API with pagination support.
        justification: |
          Commit retrieval is required to determine the set of changes between version tags.
          Pagination ensures complete history is retrieved regardless of repository size.
        tests:
          - AzureDevOpsRestClient_GetCommitsAsync_ValidResponse_ReturnsCommits

      - id: BuildMark-AzureDevOps-GetTags
        title: The AzureDevOpsRestClient shall retrieve tags from the Azure DevOps API.
        justification: |
          Tag retrieval is required to identify version boundaries for build note generation.
          All tags must be fetched to correctly determine previous version baselines.
        tests:
          - AzureDevOpsRestClient_GetTagsAsync_ValidResponse_ReturnsTags

      - id: BuildMark-AzureDevOps-GetPullRequests
        title: The AzureDevOpsRestClient shall retrieve pull requests from the Azure DevOps API with pagination support.
        justification: |
          Pull request retrieval provides the change entries for build notes. Pagination
          ensures all pull requests in the version range are included.
        tests:
          - AzureDevOpsRestClient_GetPullRequestsAsync_ValidResponse_ReturnsPullRequests
          - AzureDevOpsRestClient_GetPullRequestWorkItemsAsync_StringValuedIds_DeserializesCorrectly

      - id: BuildMark-AzureDevOps-GetWorkItems
        title: The AzureDevOpsRestClient shall retrieve work items from the Azure DevOps API with pagination support.
        justification: |
          Work item retrieval provides the issue and bug entries for build notes. Pagination
          and WIQL query support ensure complete work item coverage.
        tests:
          - AzureDevOpsRestClient_GetWorkItemsAsync_ValidResponse_ReturnsWorkItems
          - AzureDevOpsRestClient_QueryWorkItemsAsync_ValidWiql_ReturnsWorkItemIds
          - AzureDevOpsRestClient_QueryWorkItemsAsync_StringValuedIds_DeserializesCorrectly
