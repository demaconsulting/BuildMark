---
# Software Unit Requirements for the ItemControlsParser and ItemControlsInfo Classes
#
# ItemControlsParser is a static utility class that extracts a buildmark fenced
# code block from a description string and parses its key-value fields into an
# ItemControlsInfo record.
# ItemControlsInfo is the immutable data record that holds the parsed controls.

sections:
  - title: ItemControlsParser Unit Requirements
    requirements:
      - id: BuildMark-ItemControlsInfo-Record
        title: >-
          The ItemControlsInfo record shall store the parsed visibility, type,
          and affected-version values extracted from a buildmark block.
        justification: |
          Connectors need a single immutable value to carry all parsed overrides
          from ItemControlsParser to downstream classification and reporting logic.
          Storing the parsed values together keeps the parser output stable and
          easy to consume.
        tests:
          - ItemControlsParser_Parse_WithVisibilityPublic_ReturnsPublicVisibility
          - ItemControlsParser_Parse_WithTypeBug_ReturnsBugType
          - ItemControlsParser_Parse_WithAffectedVersions_ReturnsIntervalSet

      - id: BuildMark-ItemControlsParser-Parse
        title: >-
          The ItemControlsParser class shall extract and parse a buildmark code block
          from a description string, returning null when no block is present.
        justification: |
          Returning null for a missing block allows callers to apply default label-based
          rules unchanged, preserving backward compatibility with issues and pull requests
          that do not include a buildmark block.
        tests:
          - ItemControlsParser_Parse_WithVisibilityPublic_ReturnsPublicVisibility
          - ItemControlsParser_Parse_WithVisibilityInternal_ReturnsInternalVisibility
          - ItemControlsParser_Parse_WithTypeBug_ReturnsBugType
          - ItemControlsParser_Parse_WithTypeFeature_ReturnsFeatureType
          - ItemControlsParser_Parse_WithAffectedVersions_ReturnsIntervalSet
          - ItemControlsParser_Parse_WithNoBlock_ReturnsNull
          - ItemControlsParser_Parse_WithNullDescription_ReturnsNull
          - ItemControlsParser_Parse_WithEmptyDescription_ReturnsNull
          - ItemControlsParser_Parse_WithUnknownKey_IgnoresKey
          - ItemControlsParser_Parse_WithUnrecognizedVisibilityValue_IgnoresValue
          - ItemControlsParser_Parse_WithUnrecognizedTypeValue_IgnoresValue
          - ItemControlsParser_Parse_WithUnrecognizedAffectedVersionsValue_IgnoresValue

      - id: BuildMark-ItemControlsParser-HiddenBlock
        title: >-
          The ItemControlsParser class shall recognize a buildmark code block that is
          wrapped in an HTML comment.
        justification: |
          Some teams prefer clean issue descriptions without visible metadata blocks.
          The parser must strip HTML comment wrappers before scanning for the code fence
          so that hidden blocks are treated identically to visible ones.
        tests:
          - ItemControlsParser_Parse_WithHiddenBlock_ReturnsControls
          - ItemControlsParser_Parse_WithHiddenBlockVisibilityInternal_ReturnsInternalVisibility
