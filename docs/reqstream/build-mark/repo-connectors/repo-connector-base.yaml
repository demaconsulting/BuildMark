---
# Software Unit Requirements for the IRepoConnector Interface and RepoConnectorBase Class
#
# IRepoConnector defines the contract for all repository connectors.
# RepoConnectorBase provides a common base implementation including process
# execution delegation and version-list search utilities.

sections:
  - title: RepoConnectorBase Unit Requirements
    requirements:
      - id: BuildMark-RepoConnectorBase-Interface
        title: >-
          Repository connectors shall be interchangeable, allowing the factory and
          program to use any connector implementation without depending on concrete types.
        justification: |
          A common interface ensures that all repository connectors are interchangeable,
          enabling the factory and program to work with any connector implementation
          without depending on concrete types.
        tests:
          - MockRepoConnector_ImplementsInterface
          - GitHubRepoConnector_ImplementsInterface_ReturnsTrue

      - id: BuildMark-RepoConnectorBase-CommandExecution
        title: >-
          The RepoConnectorBase class shall allow shell command execution to be
          substituted for testing purposes without spawning real processes.
        justification: |
          Repository connectors run git and gh CLI commands to retrieve repository
          information. Tests must be able to substitute controlled responses for those
          commands to produce deterministic, repeatable results without network or
          filesystem dependencies.
        tests:
          - GitHubRepoConnector_GetBuildInformationAsync_WithMockedData_ReturnsValidBuildInformation
          - GitHubRepoConnector_GetBuildInformationAsync_WithMultipleVersions_SelectsCorrectPreviousVersionAndGeneratesChangelogLink

      - id: BuildMark-RepoConnectorBase-RulesRouting
        title: >-
          The RepoConnectorBase class shall accept routing rules and section definitions
          and apply them to distribute items into the appropriate report sections.
        justification: |
          Centralizing routing configuration and application in the base class ensures
          that all connectors honour the same rules and section definitions supplied by
          the program configuration, without duplicating routing logic in every concrete
          connector.
        tests:
          - RepoConnectorBase_Configure_StoresRulesAndSections_HasRulesReturnsTrue
          - RepoConnectorBase_Configure_EmptyRules_HasRulesReturnsFalse
          - RepoConnectorBase_ApplyRules_RoutesItemsToConfiguredSections
          - MockRepoConnector_Configure_StoresRulesAndSections
          - MockRepoConnector_GetBuildInformationAsync_WithRules_ReturnsRoutedSections
          - MockRepoConnector_GetBuildInformationAsync_WithoutRules_ReturnsNullRoutedSections

      - id: BuildMark-RepoConnectorBase-FindVersionIndex
        title: >-
          The RepoConnectorBase class shall locate a version tag within a list by
          semantic equality, supporting repositories that use different tag string
          formats for the same version.
        justification: |
          Matching version tags by semantic equality rather than raw tag string allows
          connectors to handle different tagging conventions (e.g., 'v1.2.3',
          'VER1.2.3', 'Release-1.2.3') without failing to find a corresponding entry.
          Centralizing this in the base class avoids duplication across connectors.
        tests:
          - RepoConnectorBase_FindVersionIndex_DifferentPrefixSameVersion_ReturnsCorrectIndex
          - RepoConnectorBase_FindVersionIndex_VersionNotInList_ReturnsMinusOne

      - id: BuildMark-RepoConnectorBase-BaselinePreRelease
        title: >-
          For a pre-release target version, RepoConnectorBase shall select the most
          recent preceding tag with a different commit hash as the baseline, skipping
          tags that share the same commit hash to avoid generating empty changelogs.
        justification: |
          When multiple pre-release tags are created from the same commit (e.g., a tag
          is renamed or recreated), using such a tag as the baseline would produce an
          empty changelog because the commit range would be empty. By skipping tags with
          the same commit hash, BuildMark always produces a meaningful changelog for
          pre-release builds.
        tests:
          - RepoConnectorBase_FindBaselineForPreRelease_SameCommitSkipped_ReturnsPreviousDistinctCommit
          - RepoConnectorBase_FindBaselineForPreRelease_AllSameCommit_ReturnsNull

      - id: BuildMark-RepoConnectorBase-BaselineRelease
        title: >-
          For a release target version, RepoConnectorBase shall select the most recent
          preceding release tag as the baseline, skipping all pre-release tags.
        justification: |
          Release notes should describe changes since the previous stable release, not
          since the most recent pre-release candidate. Skipping pre-release tags when
          selecting the baseline ensures that the generated changelog covers the complete
          set of changes that went into the release.
        tests:
          - RepoConnectorBase_FindBaselineForRelease_SkipsPreReleaseTags_ReturnsPreviousReleaseTag
          - RepoConnectorBase_FindBaselineForRelease_NoPreviousRelease_ReturnsNull

      - id: BuildMark-RepoConnectorBase-BaselineNoHistory
        title: >-
          When no qualifying baseline tag exists in the version history,
          RepoConnectorBase shall return null to indicate that build notes should be
          generated from the beginning of repository history.
        justification: |
          The first release in a repository has no predecessor tag, so there is no
          meaningful baseline from which to compute a changelog. Returning null allows
          the connector to generate build notes covering the complete repository history
          up to the first release, rather than producing an error or an empty report.
        tests:
          - RepoConnectorBase_FindBaselineForRelease_NoPreviousVersion_ReturnsNull
          - RepoConnectorBase_FindBaselineForPreRelease_NoPreviousVersion_ReturnsNull
