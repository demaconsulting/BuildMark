---
# Software Unit Requirements for the GitHubGraphQLClient Class and DescriptionBody
#
# GitHubGraphQLClient handles paginated HTTPS communication with the GitHub
# GraphQL endpoint. DescriptionBody requirements specify that pull request and
# issue description bodies are retrieved and made available for item controls
# parsing.

sections:
  - title: GitHubGraphQLClient Unit Requirements
    requirements:
      - id: BuildMark-GitHub-GraphQLClient
        title: >-
          The GitHubGraphQLClient shall retrieve repository data using the GitHub GraphQL API,
          including support for paginated responses.
        justification: |
          The GitHub API returns large result sets in pages. The client must transparently
          follow pagination cursors to retrieve all commits, releases, tags, pull requests,
          issues, and linked issue IDs so that build information reflects the complete
          repository history rather than only the first page of results.
        tests:
          - GitHubGraphQLClient_GetCommitsAsync_ValidResponse_ReturnsCommitShas
          - GitHubGraphQLClient_GetCommitsAsync_WithPagination_ReturnsAllCommits
          - GitHubGraphQLClient_GetReleasesAsync_ValidResponse_ReturnsReleaseTagNames
          - GitHubGraphQLClient_GetReleasesAsync_WithPagination_ReturnsAllReleases
          - GitHubGraphQLClient_GetAllTagsAsync_ValidResponse_ReturnsTagNodes
          - GitHubGraphQLClient_GetAllTagsAsync_WithPagination_ReturnsAllTags
          - GitHubGraphQLClient_GetPullRequestsAsync_ValidResponse_ReturnsPullRequests
          - GitHubGraphQLClient_GetPullRequestsAsync_WithPagination_ReturnsAllPullRequests
          - GitHubGraphQLClient_GetAllIssuesAsync_ValidResponse_ReturnsIssues
          - GitHubGraphQLClient_GetAllIssuesAsync_WithPagination_ReturnsAllIssues
          - GitHubGraphQLClient_FindIssueIdsLinkedToPullRequestAsync_ValidResponse_ReturnsIssueIds
          - GitHubGraphQLClient_FindIssueIdsLinkedToPullRequestAsync_WithPagination_ReturnsAllIssues
        children:
          - BuildMark-GitHub-GetCommits
          - BuildMark-GitHub-GetReleases
          - BuildMark-GitHub-GetTags
          - BuildMark-GitHub-GetPullRequests
          - BuildMark-GitHub-GetIssues

      - id: BuildMark-GitHub-DescriptionBody
        title: >-
          The GitHubRepoConnector shall make the full description text of pull
          requests and issues available for item controls parsing.
        justification: |
          ItemControlsParser requires the complete description text of each pull request
          and issue to locate and extract a buildmark code block. The description text
          must be retrieved as part of the repository data query so that item controls
          can be applied to each item.
        tests:
          - GitHubGraphQLClient_GetPullRequestsAsync_ValidResponse_ReturnsPullRequestsWithBody
          - GitHubGraphQLClient_GetAllIssuesAsync_ValidResponse_ReturnsIssuesWithBody

      - id: BuildMark-GitHub-GetCommits
        title: The GitHubGraphQLClient shall retrieve commits from the GitHub repository with pagination support.
        justification: |
          Commit retrieval is required to determine the set of changes between version tags.
          Pagination ensures complete history is retrieved regardless of repository size.
        tests:
          - GitHubGraphQLClient_GetCommitsAsync_ValidResponse_ReturnsCommitShas
          - GitHubGraphQLClient_GetCommitsAsync_WithPagination_ReturnsAllCommits

      - id: BuildMark-GitHub-GetReleases
        title: The GitHubGraphQLClient shall retrieve releases from the GitHub repository with pagination support.
        justification: |
          Release retrieval provides known-issues data based on published releases.
          Pagination ensures all releases are fetched for complete known-issue analysis.
        tests:
          - GitHubGraphQLClient_GetReleasesAsync_ValidResponse_ReturnsReleaseTagNames
          - GitHubGraphQLClient_GetReleasesAsync_WithPagination_ReturnsAllReleases

      - id: BuildMark-GitHub-GetTags
        title: The GitHubGraphQLClient shall retrieve all tags from the GitHub repository with pagination support.
        justification: |
          Tag retrieval is required to identify version boundaries for build note generation.
          All tags must be fetched to correctly determine previous version baselines.
        tests:
          - GitHubGraphQLClient_GetAllTagsAsync_ValidResponse_ReturnsTagNodes
          - GitHubGraphQLClient_GetAllTagsAsync_WithPagination_ReturnsAllTags

      - id: BuildMark-GitHub-GetPullRequests
        title: The GitHubGraphQLClient shall retrieve pull requests from the GitHub repository with pagination support.
        justification: |
          Pull request retrieval provides the change entries for build notes. Pagination
          ensures all pull requests in the version range are included.
        tests:
          - GitHubGraphQLClient_GetPullRequestsAsync_ValidResponse_ReturnsPullRequests
          - GitHubGraphQLClient_GetPullRequestsAsync_WithPagination_ReturnsAllPullRequests
          - GitHubGraphQLClient_GetPullRequestsAsync_ValidResponse_ReturnsPullRequestsWithBody

      - id: BuildMark-GitHub-GetIssues
        title: The GitHubGraphQLClient shall retrieve issues from the GitHub repository with pagination support.
        justification: |
          Issue retrieval provides bug fix entries and known-issue data. Pagination
          ensures all issues associated with the version range are included.
        tests:
          - GitHubGraphQLClient_GetAllIssuesAsync_ValidResponse_ReturnsIssues
          - GitHubGraphQLClient_GetAllIssuesAsync_WithPagination_ReturnsAllIssues
          - GitHubGraphQLClient_GetAllIssuesAsync_ValidResponse_ReturnsIssuesWithBody
          - GitHubGraphQLClient_FindIssueIdsLinkedToPullRequestAsync_ValidResponse_ReturnsIssueIds
          - GitHubGraphQLClient_FindIssueIdsLinkedToPullRequestAsync_WithPagination_ReturnsAllIssues
