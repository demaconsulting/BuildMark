---
# Software Unit Requirements for the ItemRouter Class
#
# ItemRouter distributes ItemInfo records into configured report sections using
# section definitions and routing rules supplied by the active connector.

sections:
  - title: ItemRouter Unit Requirements
    requirements:
      - id: BuildMark-ItemRouter-Route
        title: >-
          The ItemRouter class shall assign items to report sections according to
          the configured rules and sections.
        justification: |
          Centralizing routing logic ensures all connectors classify and group
          items consistently when generating build notes, without duplicating the
          same rule-processing behavior in multiple connector implementations.
        tests: []
