---
# BuildMark WebLink unit requirements
sections:
  - title: BuildMark Requirements
    sections:
      - title: BuildNotes Requirements
        sections:
          - title: WebLink Requirements
            requirements:
              - id: BuildMark-WebLink-Record
                title: >-
                  The WebLink record shall store display text and a target URL for a
                  hyperlink included in the generated report.
                justification: |
                  BuildInformation needs a lightweight value object for optional links such
                  as the full changelog entry so the rendered markdown can present a stable
                  label and destination.
                tests:
                  - WebLink_Constructor_StoresTextAndUrl
