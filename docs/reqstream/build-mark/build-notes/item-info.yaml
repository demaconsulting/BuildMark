---
# BuildMark ItemInfo unit requirements
sections:
  - title: BuildMark Requirements
    sections:
      - title: BuildNotes Requirements
        sections:
          - title: ItemInfo Requirements
            requirements:
              - id: BuildMark-ItemInfo-Record
                title: >-
                  The ItemInfo record shall carry the identifier, title, link, type,
                  ordering index, and optional affected-version data for one report item.
                justification: |
                  Connectors and downstream report generation need a stable data shape for
                  individual changes, bug fixes, and known issues so that items can be
                  sorted, classified, filtered, and rendered consistently.
                tests:
                  - BuildInformation_GetBuildInformationAsync_OrdersChangesByIndex
                  - BuildInformation_ToMarkdown_UsesBulletLists
