---
# Utilities Subsystem Requirements
#
# PURPOSE:
# - Define requirements for the BuildMark Utilities subsystem
# - The Utilities subsystem spans PathHelpers.cs, ProcessRunner.cs, Version.cs,
#   VersionInterval.cs, and VersionIntervalSet.cs
# - Subsystem requirements describe the shared utility behavior available to all other subsystems

sections:
  - title: Utilities Subsystem Requirements
    requirements:
      - id: BuildMark-Utilities-SafePaths
        title: The Utilities subsystem shall provide safe file path manipulation that prevents path traversal.
        justification: |
          The Utilities subsystem provides shared path utilities consumed by other subsystems.
          When constructing file paths from caller-supplied inputs, the subsystem must reject
          path traversal sequences (such as '..') and absolute paths to prevent unintended
          file system access. This requirement captures the subsystem-level safety guarantee
          that all consumers of the Utilities subsystem can rely upon.
        tests:
          - Utilities_SafePaths_ValidPaths_CombinesCorrectly
          - Utilities_SafePaths_TraversalPath_ThrowsException
          - Utilities_SafePaths_AbsolutePath_ThrowsException
        children:
          - BuildMark-PathHelpers-SafeCombine

      - id: BuildMark-Utilities-ProcessRunner
        title: The Utilities subsystem shall provide a process execution utility for running external shell commands.
        justification: |
          Multiple subsystems need to execute shell commands (e.g., git, gh CLI) to retrieve
          repository information and authentication tokens. Placing ProcessRunner in the shared
          Utilities subsystem ensures a consistent, testable interface with proper error
          handling, avoiding duplication across connector implementations.
        tests:
          - Utilities_ProcessRunner_ValidCommand_ReturnsOutput
          - Utilities_ProcessRunner_InvalidCommand_ReturnsNull
          - Utilities_ProcessRunner_FailingCommand_ThrowsException
        children:
          - BuildMark-ProcessRunner-RunAsync

      - id: BuildMark-Utilities-Version
        title: The Utilities subsystem shall provide a shared parser for repository version tags.
        justification: |
          Multiple subsystems need a consistent representation of release tags
          when selecting baselines, identifying current versions, and evaluating
          version ranges. Placing Version in Utilities centralizes that parsing
          and normalization logic for reuse across the system.
        tests:
          - Utilities_Version_SimpleTag_ParsesCorrectly
          - Utilities_Version_PreRelease_DetectsCorrectly
          - Utilities_Version_InvalidTag_ReturnsNull
        children:
          - BuildMark-Version-Parse
          - BuildMark-Version-InvalidTag

      - id: BuildMark-Utilities-VersionInterval
        title: >-
          The Utilities subsystem shall provide version interval parsing using mathematical
          interval notation.
        justification: |
          Version intervals are a general-purpose concept used to express affected-version
          ranges in repository item metadata. Placing this logic in Utilities makes it
          available to any subsystem without coupling it to a specific connector.
        tests:
          - Utilities_VersionInterval_ValidInterval_Parses
          - Utilities_VersionInterval_InvalidInterval_ReturnsNull
          - Utilities_VersionIntervalSet_MultipleIntervals_ParsesAll
          - Utilities_VersionIntervalSet_EmptyString_ReturnsEmpty
        children:
          - BuildMark-VersionInterval-Parse
          - BuildMark-VersionIntervalSet-Parse
