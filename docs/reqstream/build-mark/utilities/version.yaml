---
# Software Unit Requirements for the VersionInfo Class
#
# VersionInfo parses repository tag strings into normalized semantic version data.
# It supports optional prefixes, optional pre-release segments, and optional
# build metadata so callers can work with a consistent representation.

sections:
  - title: VersionInfo Unit Requirements
    requirements:
      - id: BuildMark-Version-Parse
        title: >-
          The VersionInfo class shall parse supported repository tag formats into
          normalized semantic version information.
        justification: |
          BuildMark relies on repository tags to identify release boundaries and
          report version ranges. A shared version parser ensures connectors and
          reporting logic interpret prefixes, pre-release suffixes, and metadata
          consistently across the system.
        tests:
          - VersionInfo_Create_SimpleVPrefix_ParsesVersion
          - VersionInfo_Create_VerPrefix_ParsesVersion
          - VersionInfo_Create_ReleaseUnderscorePrefix_ParsesVersion
          - VersionInfo_Create_AlphaPreRelease_DetectsPreRelease
          - VersionInfo_Create_BetaPreRelease_DetectsPreRelease
          - VersionInfo_Create_RcPreRelease_DetectsPreRelease
          - VersionInfo_Create_PrePreRelease_DetectsPreRelease
          - VersionInfo_Create_NoPrefix_ParsesVersion
          - VersionInfo_Create_ComplexPrefix_ParsesVersion
          - VersionInfo_Create_BuildMetadata_ParsesVersion
          - VersionInfo_Create_DotSeparatedSuffix_TreatsAsPreRelease
          - VersionInfo_Create_ComplexVersionWithMetadata_ParsesVersion
          - VersionInfo_Create_HyphenPreReleaseWithMetadata_ParsesVersion
          - VersionInfo_Create_RcWithNumber_DetectsPreRelease
          - VersionInfo_Create_PreReleaseWithBuildMetadata_ParsesVersion

      - id: BuildMark-Version-InvalidTag
        title: >-
          The VersionInfo class shall reject unrecognized tag formats by returning
          null from TryCreate and throwing from Create.
        justification: |
          Repository connectors need a clear distinction between valid release
          tags and unrelated tags. A non-throwing parse path supports filtering,
          while a throwing path supports callers that require a valid version.
        tests:
          - VersionInfo_TryCreate_InvalidTag_ReturnsNull
          - VersionInfo_Create_InvalidTag_ThrowsArgumentException
