---
sections:
  - title: BuildMark System Requirements
    sections:
      - title: Command-Line Interface
        requirements:
          - id: BuildMark-Command-Cli
            title: The tool shall provide a command-line interface.
            justification: |
              A command-line interface is essential for BuildMark to integrate seamlessly into
              automated build pipelines, CI/CD workflows, and scripting environments. This enables
              developers and build systems to invoke the tool programmatically without requiring
              a graphical user interface.
            tests:
              - IntegrationTest_VersionFlag_OutputsVersion
              - IntegrationTest_HelpFlag_OutputsUsageInformation
            children:
              - BuildMark-Cli-Context
              - BuildMark-Cli-Version
              - BuildMark-Cli-Help
              - BuildMark-Cli-Silent
              - BuildMark-Cli-BuildVersion
              - BuildMark-Cli-Report
              - BuildMark-Cli-Log
              - BuildMark-Cli-Validate
              - BuildMark-Cli-Results
              - BuildMark-Cli-ErrorOutput
              - BuildMark-Cli-InvalidArgs
              - BuildMark-Cli-ExitCode

          - id: BuildMark-Command-Version
            title: The tool shall display version information when requested.
            justification: |
              Version information helps users identify which version of BuildMark they are running,
              which is critical for debugging issues, ensuring compatibility, and tracking tool
              updates across different environments.
            tests:
              - IntegrationTest_VersionFlag_OutputsVersion
            children:
              - BuildMark-Cli-Version

          - id: BuildMark-Command-Help
            title: The tool shall display help information when requested.
            justification: |
              Help information provides users with immediate access to usage instructions, available
              commands, and parameter descriptions. This improves user experience and reduces the
              learning curve for new users without requiring external documentation.
            tests:
              - IntegrationTest_HelpFlag_OutputsUsageInformation
            children:
              - BuildMark-Cli-Help

          - id: BuildMark-Command-Silent
            title: The tool shall support silent mode to suppress console output.
            justification: |
              Silent mode is essential for automated build environments where excessive console
              output can clutter logs or interfere with parsing build results. This allows users
              to control verbosity based on their specific use case.
            tests:
              - IntegrationTest_SilentFlag_SuppressesOutput
            children:
              - BuildMark-Cli-Silent

          - id: BuildMark-Command-Log
            title: The tool shall support writing output to a log file.
            justification: |
              Log file support enables persistent storage of BuildMark output for audit trails,
              troubleshooting, and post-build analysis. This is particularly valuable in automated
              environments where console output may not be easily accessible.
            tests:
              - IntegrationTest_LogParameter_IsAccepted
            children:
              - BuildMark-Cli-Log

          - id: BuildMark-Command-BuildVersion
            title: The tool shall support specifying a build version.
            justification: |
              Specifying a build version allows users to override or supplement version information
              from source control, enabling flexible version management strategies and supporting
              scenarios where version numbers are determined externally.
            tests:
              - IntegrationTest_BuildVersionParameter_IsAccepted
            children:
              - BuildMark-Cli-BuildVersion

          - id: BuildMark-Command-InvalidArgs
            title: The tool shall validate command-line arguments.
            justification: |
              Argument validation prevents misuse of the tool and provides clear error messages
              when invalid inputs are provided. This improves reliability, helps users identify
              configuration errors early, and prevents unexpected behavior in automated workflows.
            tests:
              - IntegrationTest_InvalidArgument_ShowsError
            children:
              - BuildMark-Cli-InvalidArgs

          - id: BuildMark-Command-FilePaths
            title: The tool shall handle invalid file paths gracefully.
            justification: |
              Graceful handling of invalid file paths prevents cryptic error messages and ensures
              the tool fails safely when given incorrect paths. This improves user experience and
              makes troubleshooting easier in production environments.
            tests:
              - IntegrationTest_InvalidReportPath_ShowsError
            children:
              - BuildMark-Cli-InvalidArgs

          - id: BuildMark-Command-ExitCode
            title: The tool shall return appropriate exit codes.
            justification: |
              Standard exit codes enable build automation systems and scripts to detect success
              or failure conditions programmatically. This is fundamental for proper integration
              into CI/CD pipelines and automated workflows.
            tests:
              - IntegrationTest_InvalidArgument_ShowsError
            children:
              - BuildMark-Cli-ExitCode

      - title: GitHub Integration
        requirements:
          - id: BuildMark-GitHub-BuildNotes
            title: The tool shall generate build notes from GitHub repositories.
            justification: |
              Generating build notes from GitHub repositories automates the documentation of
              changes between releases. This saves significant time during release processes and
              ensures consistency in release documentation by deriving information directly from
              source control history.
            tests:
              - IntegrationTest_Report_GeneratesMarkdownWithVersionInformation
            children:
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-GitHub-IssueTracking
            title: The tool shall track issues and pull requests from GitHub.
            justification: |
              Tracking issues and pull requests provides traceability between code changes and
              work items, enabling comprehensive release notes that link features, bug fixes, and
              improvements to their corresponding GitHub issues and pull requests.
            tests:
              - IntegrationTest_Report_ContainsChangesAndBugFixesWithHyperlinks
            children:
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-GitHub-VersionTags
            title: The tool shall identify changes between version tags.
            justification: |
              Identifying changes between version tags enables differential release notes that
              accurately capture what changed in each version. This is essential for semantic
              versioning workflows and helps users understand the scope of changes between releases.
            tests:
              - IntegrationTest_Report_ShowsVersionRangeFromPreviousRelease
            children:
              - BuildMark-RepoConnectors-GitHub

      - title: Azure DevOps Integration
        requirements:
          - id: BuildMark-AzureDevOps-BuildNotes
            title: The tool shall generate build notes from Azure DevOps repositories.
            justification: |
              Generating build notes from Azure DevOps repositories automates the documentation of
              changes between releases for teams using Azure DevOps. This saves significant time
              during release processes and ensures consistency in release documentation by deriving
              information directly from source control history and work items.
            tests:
              - IntegrationTest_AzureDevOps_Report_GeneratesMarkdownWithVersionInformation
            children:
              - BuildMark-RepoConnectors-AzureDevOps

          - id: BuildMark-AzureDevOps-IssueTracking
            title: The tool shall track work items and pull requests from Azure DevOps.
            justification: |
              Tracking work items and pull requests from Azure DevOps provides traceability between
              code changes and work items, enabling comprehensive release notes that link features,
              bug fixes, and improvements to their corresponding Azure DevOps work items and pull
              requests.
            tests:
              - IntegrationTest_AzureDevOps_Report_ContainsChangesAndBugFixesWithHyperlinks
            children:
              - BuildMark-RepoConnectors-AzureDevOps

          - id: BuildMark-AzureDevOps-VersionTags
            title: The tool shall identify changes between version tags in Azure DevOps repositories.
            justification: |
              Identifying changes between version tags enables differential release notes that
              accurately capture what changed in each version for Azure DevOps repositories. This is
              essential for semantic versioning workflows and helps users understand the scope of
              changes between releases.
            tests:
              - IntegrationTest_AzureDevOps_Report_ShowsVersionRangeFromPreviousRelease
            children:
              - BuildMark-RepoConnectors-AzureDevOps

      - title: Configuration File
        requirements:
          - id: BuildMark-Config-File
            title: The tool shall consume settings from a `.buildmark.yaml` configuration file in the repository root.
            justification: |
              A dedicated configuration file separates persistent repository settings from runtime
              arguments, simplifying CI invocations and enabling version-controlled configuration.
            tests:
              - IntegrationTest_Report_ConsumesConfigurationFileDuringGeneration
            children:
              - BuildMark-Configuration-Read
              - BuildMark-Program-Lint

          - id: BuildMark-Config-Connector
            title: The tool shall read repository connector settings from the `.buildmark.yaml` file.
            justification: |
              Centralizing connector configuration in the repository avoids repeating connection
              details across multiple CI pipelines.
            tests:
              - IntegrationTest_Report_UsesConnectorForBuildData
            children:
              - BuildMark-Configuration-ConnectorConfig
              - BuildMark-RepoConnectors-Factory
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-Config-Sections
            title: The tool shall read report section definitions from the `.buildmark.yaml` file.
            justification: |
              Configurable sections let teams tailor the structure of generated build notes to
              their conventions without modifying the tool.
            tests:
              - IntegrationTest_Report_ContainsSectionDefinitions
            children:
              - BuildMark-Configuration-Read

          - id: BuildMark-Config-Rules
            title: >-
              The tool shall read item routing rules from the `.buildmark.yaml` file and route
              items to the appropriate report section.
            justification: |
              Declarative routing rules allow repository owners to control categorization of items
              without embedding logic in CI scripts.
            tests:
              - IntegrationTest_Report_RoutesItemsToCorrectSections
            children:
              - BuildMark-Configuration-Read
              - BuildMark-RepoConnectors-ItemRouter

          - id: BuildMark-Config-Lint
            title: >-
              The tool shall provide a --lint flag to validate the .buildmark.yaml
              configuration file and report any issues.
            justification: |
              Operators need a way to verify the configuration file is well-formed without
              running a full build. Linting with precise issue locations helps teams fix
              configuration errors quickly.
            tests:
              - IntegrationTest_LintFlag_IsAccepted
            children:
              - BuildMark-Configuration-Issues
              - BuildMark-Program-Lint

      - title: Report Generation
        requirements:
          - id: BuildMark-Report-Markdown
            title: The tool shall generate markdown reports.
            justification: |
              Markdown is a widely-adopted, human-readable format that works seamlessly with
              GitHub, documentation systems, and static site generators. Generating reports in
              markdown format ensures broad compatibility and easy integration into existing
              documentation workflows.
            tests:
              - IntegrationTest_Report_GeneratesMarkdownWithVersionInformation
            children:
              - BuildMark-BuildNotes-ReportModel
              - BuildMark-Program-Report

          - id: BuildMark-Report-Depth
            title: The tool shall support configurable report depth.
            justification: |
              Configurable report depth allows BuildMark output to be embedded within existing
              documentation structures by adjusting heading levels. This flexibility ensures
              reports integrate properly regardless of the document hierarchy.
            tests:
              - IntegrationTest_Report_DepthTwo_UsesLevelTwoHeadings
            children:
              - BuildMark-BuildNotes-ReportModel
              - BuildMark-Program-Report

          - id: BuildMark-Report-VersionInfo
            title: The tool shall report version information in build notes.
            justification: |
              Version information clearly identifies which release the build notes describe,
              providing essential context for users reviewing changes and enabling proper
              organization of release documentation.
            tests:
              - IntegrationTest_Report_GeneratesMarkdownWithVersionInformation
            children:
              - BuildMark-BuildNotes-ReportModel
              - BuildMark-Program-Report

          - id: BuildMark-Report-Changes
            title: The tool shall report changes in build notes.
            justification: |
              Reporting changes documents new features and enhancements introduced in each
              release, helping users understand the evolution of the software and make informed
              decisions about upgrading.
            tests:
              - IntegrationTest_Report_ContainsChangesAndBugFixesWithHyperlinks
            children:
              - BuildMark-BuildNotes-ReportModel
              - BuildMark-Program-Report

          - id: BuildMark-Report-BugFixes
            title: The tool shall report bug fixes in build notes.
            justification: |
              Documenting bug fixes informs users about resolved issues, demonstrates ongoing
              maintenance, and helps users determine if specific problems they encountered have
              been addressed in newer versions.
            tests:
              - IntegrationTest_Report_ContainsChangesAndBugFixesWithHyperlinks
            children:
              - BuildMark-BuildNotes-ReportModel
              - BuildMark-Program-Report

          - id: BuildMark-Report-KnownIssues
            title: >-
              The tool shall support including known issues in build notes, using
              affected-versions metadata when available and falling back to open/closed
              status when it is not.
            justification: |
              Disclosing known issues in release notes promotes transparency, helps users avoid
              known pitfalls, and manages expectations about current limitations.

              The following rules determine whether a bug is a known issue for a given build:

              1. A closed bug with no declared affected-versions is NOT a known issue.
              2. An open bug with no declared affected-versions IS a known issue.
              3. A bug in any state (open or closed) whose declared affected-versions contain
                 the build version IS a known issue.
              4. A bug in any state (open or closed) whose declared affected-versions do NOT
                 contain the build version is NOT a known issue.

              This matters for LTS branches: a bug may be closed after being fixed in a later
              release, but an LTS branch that was cut before the fix still needs to report the
              bug as a known issue. The affected-versions field captures that scenario precisely.
            tests:
              - IntegrationTest_Report_IncludesKnownIssues_WhenFlagIsSet
            children:
              - BuildMark-BuildNotes-ReportModel
              - BuildMark-Program-Report
              - BuildMark-RepoConnectors-GitHub
              - BuildMark-RepoConnectors-AzureDevOps
              - BuildMark-RepoConnectors-Mock

          - id: BuildMark-Report-VersionRange
            title: The tool shall support filtering build notes by version range.
            justification: |
              Version range filtering enables generation of cumulative release notes covering
              multiple versions or focused notes for specific releases. This flexibility supports
              various documentation scenarios and user needs.
            tests:
              - IntegrationTest_Report_ShowsVersionRangeFromPreviousRelease
            children:
              - BuildMark-BuildNotes-ReportModel
              - BuildMark-Program-Report

          - id: BuildMark-Report-Hyperlinks
            title: The tool shall include hyperlinks to issues and pull requests.
            justification: |
              Hyperlinks provide direct navigation to detailed information about changes,
              enabling users to investigate specific items of interest and maintaining
              traceability between release notes and source repository work items.
            tests:
              - IntegrationTest_Report_ContainsChangesAndBugFixesWithHyperlinks
            children:
              - BuildMark-BuildNotes-ReportModel
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-Report-Structure
            title: The tool shall format build notes with proper markdown structure.
            justification: |
              Proper markdown structure ensures reports render correctly across different
              markdown processors and documentation platforms. Well-structured documents are
              more readable, professional, and maintainable.
            tests:
              - IntegrationTest_Report_GeneratesMarkdownWithVersionInformation
            children:
              - BuildMark-BuildNotes-ReportModel
              - BuildMark-Program-Report

      - title: Extended Item Controls
        requirements:
          - id: BuildMark-Controls-Block
            title: The tool shall recognize a buildmark code block in issue and pull request descriptions.
            justification: |
              A dedicated buildmark code block provides a structured, machine-readable way for
              developers to attach control metadata directly to issues and pull requests. This
              eliminates the need for custom GitHub labels or external configuration files and
              keeps all item-level controls co-located with the work item itself.
            tests:
              - IntegrationTest_Report_RecognizesBuildmarkCodeBlock
            children:
              - BuildMark-RepoConnectors-ItemControls

          - id: BuildMark-Controls-Visibility
            title: >-
              The tool shall support a visibility field in the buildmark block to
              override default item visibility in the build notes.
            justification: |
              Developers may need to suppress internal housekeeping items from public release
              notes, or promote items that would otherwise be excluded. A visibility override
              gives fine-grained control without altering GitHub labels.
            tests:
              - IntegrationTest_Report_VisibilityFieldControlsInclusion
            children:
              - BuildMark-RepoConnectors-ItemControls
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-Controls-VisibilityPublic
            title: >-
              The tool shall include an item in the build notes when visibility is set to
              public, overriding any default exclusion rules.
            justification: |
              Some items lack the standard labels that trigger automatic inclusion. The public
              value ensures these items still appear in the generated notes when the developer
              explicitly requests it.
            tests:
              - IntegrationTest_Report_PublicVisibility_IncludesItem
            children:
              - BuildMark-RepoConnectors-ItemControls
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-Controls-VisibilityInternal
            title: >-
              The tool shall exclude an item from the build notes when visibility is set
              to internal, overriding any default inclusion rules including standard issue labels.
            justification: |
              Items such as dependency updates, internal refactoring, or CI configuration changes
              are often irrelevant to end-users. The internal value lets developers suppress such
              items without removing the labels that are used for other project-management purposes.
            tests:
              - IntegrationTest_Report_InternalVisibility_ExcludesItem
            children:
              - BuildMark-RepoConnectors-ItemControls
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-Controls-Type
            title: >-
              The tool shall support a type field in the buildmark block to override
              the item classification used in the build notes.
            justification: |
              GitHub labels do not always map cleanly to the bug/feature distinction used in
              release notes. A type override lets developers correct the classification for any
              individual item without modifying project-wide label conventions.
            tests:
              - IntegrationTest_Report_TypeFieldOverridesClassification
            children:
              - BuildMark-RepoConnectors-ItemControls
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-Controls-TypeBug
            title: >-
              The tool shall classify an item as a bug fix when type is set to bug,
              placing it in the Bugs Fixed section of the report.
            justification: |
              Correct classification of bug fixes is important for end-users assessing whether a
              release addresses their reported problems. An explicit override ensures accuracy
              even when labels are missing or inconsistent.
            tests:
              - IntegrationTest_Report_TypeBug_PlacesItemInBugsFixed
            children:
              - BuildMark-RepoConnectors-ItemControls
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-Controls-TypeFeature
            title: >-
              The tool shall classify an item as a feature or change when type is set to
              feature, placing it in the Changes section of the report.
            justification: |
              Not all feature work carries the expected labels. An explicit override ensures the
              item appears under Changes rather than being misclassified or omitted.
            tests:
              - IntegrationTest_Report_TypeFeature_PlacesItemInChanges
            children:
              - BuildMark-RepoConnectors-ItemControls
              - BuildMark-RepoConnectors-GitHub

          - id: BuildMark-Controls-AffectedVersions
            title: >-
              The tool shall support an affected-versions field in the buildmark block
              to record which software versions are affected by the change.
            justification: |
              Encoding affected versions directly on the work item improves traceability and
              enables downstream tooling to filter or highlight relevant items for a given
              release without relying on external spreadsheets or manual documentation.
            tests:
              - IntegrationTest_Report_AffectedVersionsField_ProcessesSuccessfully
            children:
              - BuildMark-RepoConnectors-ItemControls
              - BuildMark-VersionInterval-Parse

          - id: BuildMark-Controls-AffectedVersionsInterval
            title: >-
              The affected-versions field shall use mathematical interval notation with
              inclusive and exclusive bounds, and shall support multiple comma-separated ranges.
            justification: |
              Mathematical interval notation is compact, unambiguous, and familiar to developers.
              Supporting multiple ranges allows expression of disjoint sets of affected versions
              in a single field, covering scenarios such as a bug present in two separate
              release branches.
            tests:
              - IntegrationTest_Report_AffectedVersionsInterval_ParsesNotation
            children:
              - BuildMark-RepoConnectors-ItemControls
              - BuildMark-VersionInterval-Parse

          - id: BuildMark-Controls-HiddenBlock
            title: >-
              The tool shall recognize a buildmark code block that is wrapped in an HTML
              comment, allowing developers to hide the block from the GitHub rendered view.
            justification: |
              Some teams prefer clean issue descriptions without visible metadata blocks. Allowing
              the block to be hidden in an HTML comment satisfies both the need to supply control
              data and the desire for a tidy rendered appearance.
            tests:
              - IntegrationTest_Report_HiddenBuildmarkBlock_IsRecognized
            children:
              - BuildMark-RepoConnectors-ItemControls

      - title: Validation and Testing
        requirements:
          - id: BuildMark-Validation-SelfValidation
            title: The tool shall support self-validation mode.
            justification: |
              Self-validation mode allows users to validate the tool's functionality in their
              environment, providing evidence that the user's environment does not introduce
              unexpected behaviors, and giving users evidence they can rely on the tool's output.
            tests:
              - IntegrationTest_ValidateFlag_RunsSelfValidation
            children:
              - BuildMark-SelfTest-Qualification

          - id: BuildMark-Validation-ResultsFiles
            title: The tool shall write validation results to test result files.
            justification: |
              Writing validation results to files enables integration with testing frameworks,
              CI/CD pipelines, and reporting tools. This allows BuildMark's validation results
              to be tracked, analyzed, and reported alongside other test metrics.
            tests:
              - IntegrationTest_ResultsParameter_IsAccepted
            children:
              - BuildMark-SelfTest-ResultsOutput

          - id: BuildMark-Validation-TrxFormat
            title: The tool shall support TRX format for test results.
            justification: |
              TRX format support enables integration with Microsoft test tooling and Visual
              Studio Test Explorer, providing native support for .NET development environments
              and Azure DevOps pipelines.
            tests:
              - IntegrationTest_ResultsParameter_IsAccepted
            children:
              - BuildMark-SelfTest-ResultsOutput

          - id: BuildMark-Validation-JUnitFormat
            title: The tool shall support JUnit format for test results.
            justification: |
              JUnit format is a widely-supported standard across many CI/CD platforms and
              testing tools. Supporting this format ensures BuildMark can integrate with diverse
              toolchains beyond the Microsoft ecosystem.
            tests:
              - IntegrationTest_ResultsParameter_IsAccepted
            children:
              - BuildMark-SelfTest-ResultsOutput
