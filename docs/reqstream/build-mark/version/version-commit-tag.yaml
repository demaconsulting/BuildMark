---
# BuildMark VersionCommitTag unit requirements
sections:
  - title: BuildMark Requirements
    sections:
      - title: Version Requirements
        sections:
          - title: VersionCommitTag Requirements
            requirements:
              - id: BuildMark-VersionCommitTag-Record
                title: >-
                  The VersionCommitTag record shall store a parsed version together with the
                  commit hash associated with that version tag.
                justification: |
                  BuildMark reports both the semantic version and the commit boundary for
                  the current and baseline release tags. The record keeps those values
                  paired so range calculations and report rendering stay consistent.
                tests:
                  - VersionCommitTag_Constructor_ValidParameters_CreatesInstance
