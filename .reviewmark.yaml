  - id: BuildMark-AllRequirements
    title: Review of BuildMark requirements quality and traceability
    paths:
      - "requirements.yaml"
      - "docs/reqstream/build-mark/**/*.yaml"
      - "docs/reqstream/ots/**/*.yaml"

  # Subsystem reviews
