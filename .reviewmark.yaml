# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following hierarchical scope principles.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "README.md"                   # Root README file
  - "requirements.yaml"           # Root requirements file
  - "**/*.cs"                     # All C# source and test files
  - "docs/reqstream/**/*.yaml"    # Requirements files
  - "docs/design/**/*.md"         # Design documentation files
  - "docs/user_guide/**/*.md"     # User guide documentation
  - "docs/verification/**/*.md"   # Verification documentation files
  - "!**/obj/**"                  # Exclude build output
  - "!**/bin/**"                  # Exclude build output
  - "!node_modules/**"            # Exclude npm dependencies
  - "!**/.venv/**"                # Exclude Python virtual environment

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/BuildMark/reviews/index.json

# Review sets following hierarchical scope principles.
# Each review-set focuses on a single compliance question with manageable file counts.
reviews:
  # Purpose
  - id: Purpose
    title: Review of user-facing capabilities and system promises
    paths:
      - "README.md"
      - "docs/user_guide/**/*.md"
      - "docs/reqstream/build-mark/build-mark.yaml"
      - "docs/design/introduction.md"
      - "docs/design/build-mark/build-mark.md"
      - "docs/verification/introduction.md"

  # BuildMark - Specials
  - id: BuildMark-Architecture
    title: Review of BuildMark system architecture and operational validation
    paths:
      - "docs/reqstream/build-mark/build-mark.yaml"
      - "docs/design/introduction.md"
      - "docs/design/build-mark/build-mark.md"
      - "test/**/IntegrationTests.cs"
      - "test/**/Runner.cs"
      - "test/**/AssemblyInfo.cs"
      - "docs/verification/build-mark/build-mark.md"

  - id: BuildMark-Design
    title: Review of BuildMark architectural and design consistency
    paths:
      - "docs/reqstream/build-mark/build-mark.yaml"
      - "docs/reqstream/build-mark/platform-requirements.yaml"
      - "docs/design/introduction.md"
      - "docs/design/build-mark/**/*.md"

  - id: BuildMark-AllRequirements
    title: Review of All BuildMark requirements quality and traceability
    paths:
      - "requirements.yaml"
      - "docs/reqstream/build-mark/**/*.yaml"
      - "docs/reqstream/ots/**/*.yaml"

  # BuildMark - OTS
  - id: BuildMark-OTS
    title: Review of OTS tool verification documentation
    paths:
